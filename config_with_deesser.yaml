# Configuration that prefers an external vocal de-esser but can fall back to builtin mode.
sample_rate: 48000

stem_detection:
  vocals: [vox, vocal, lead, singer]
  drums: [drum, drums, kit, percussion]
  bass: [bass, sub]
  guitar: [gtr, guitar]
  keys: [keys, piano, synth, pad, rhodes, organ]

alignment:
  enabled: false
  threshold_dbfs: -45.0
  min_offset_ms: 25.0

chains:
  default:
    hpf_hz: 50.0
    stereo_width: 1.0
    compressor: {threshold_db: -20.0, ratio: 2.0, attack_ms: 15.0, release_ms: 120.0, makeup_db: 0.0}
    eq_peaks:
      - {freq: 300.0, q: 1.0, gain_db: -1.0}
    parallel_comp_blend: 0.0

  vocals:
    hpf_hz: 80.0
    stereo_width: 0.9
    deesser:
      mode: external
      external_deesser_vst3: "C:/Program Files/Common Files/VST3/T-De-Esser 2.vst3"
      frequency_hz: 6200.0
      threshold_db: -28.0
      ratio: 4.0
      amount: 0.6
      attack_ms: 2.0
      release_ms: 90.0
    compressor: {threshold_db: -18.0, ratio: 2.5, attack_ms: 10.0, release_ms: 80.0, makeup_db: 0.5}
    eq_peaks:
      - {freq: 300.0, q: 1.0, gain_db: -2.0}
      - {freq: 3500.0, q: 1.2, gain_db: -1.5}
    parallel_comp_blend: 0.0

  drums:
    hpf_hz: 30.0
    stereo_width: 1.0
    compressor: {threshold_db: -16.0, ratio: 3.0, attack_ms: 8.0, release_ms: 120.0, makeup_db: 0.0}
    eq_peaks:
      - {freq: 200.0, q: 1.0, gain_db: -1.5}
      - {freq: 5000.0, q: 0.8, gain_db: 1.0}
    parallel_comp_blend: 0.3

  bass:
    hpf_hz: 30.0
    stereo_width: 0.7
    compressor: {threshold_db: -18.0, ratio: 3.0, attack_ms: 20.0, release_ms: 150.0, makeup_db: 0.0}
    eq_peaks:
      - {freq: 80.0, q: 1.0, gain_db: -1.0}
      - {freq: 300.0, q: 1.0, gain_db: -1.0}
    parallel_comp_blend: 0.0

  guitar:
    hpf_hz: 60.0
    stereo_width: 1.1
    compressor: {threshold_db: -20.0, ratio: 2.0, attack_ms: 15.0, release_ms: 120.0, makeup_db: 0.0}
    eq_peaks:
      - {freq: 250.0, q: 1.0, gain_db: -1.5}
      - {freq: 3500.0, q: 1.0, gain_db: 1.0}
    parallel_comp_blend: 0.0

  keys:
    hpf_hz: 50.0
    stereo_width: 1.0
    compressor: {threshold_db: -20.0, ratio: 2.0, attack_ms: 20.0, release_ms: 120.0, makeup_db: 0.0}
    eq_peaks:
      - {freq: 250.0, q: 1.0, gain_db: -1.0}
      - {freq: 8000.0, q: 0.7, gain_db: 1.0}
    parallel_comp_blend: 0.0

buses:
  default: {target_rms_dbfs: -20.0, gain_db: 0.0, pan: 0.0, stereo_width: 1.0}
  vocals: {target_rms_dbfs: -18.5, gain_db: 0.0, pan: 0.0, stereo_width: 0.95}
  drums: {target_rms_dbfs: -18.0, gain_db: 0.0, pan: 0.0, stereo_width: 1.0, mono_below_hz: 130.0}
  bass: {target_rms_dbfs: -19.5, gain_db: 0.0, pan: 0.0, stereo_width: 0.8, mono_below_hz: 160.0}
  guitar: {target_rms_dbfs: -21.0, gain_db: 0.0, pan: -0.15, stereo_width: 1.1}
  keys: {target_rms_dbfs: -21.0, gain_db: 0.0, pan: 0.15, stereo_width: 1.05}

sidechain:
  enabled: false
  trigger: drums
  targets: [bass]
  amount: 0.22
  attack_ms: 5.0
  release_ms: 120.0
  mode: low_band
  low_band_hz: 150.0

master:
  hpf_hz: 30.0
  high_shelf: {freq_hz: 10000.0, gain_db: 0.8}
  compressor: {threshold_db: -14.0, ratio: 1.4, attack_ms: 15.0, release_ms: 150.0, makeup_db: 0.0}
  limiter: {ceiling_dbfs: -1.0, release_ms: 120.0}
  target_lufs: -14.0
  reference_match: {tonal_balance_mode: report, amount: 0.5, max_tilt_db_per_octave: 3.0}
  multiband:
    enabled: false
    bands: [100, 500, 2000, 8000]
    ratios: [1.5, 1.8, 2.0, 1.5, 1.3]
    threshold_db: -20.0
    attack_ms: 10.0
    release_ms: 120.0
