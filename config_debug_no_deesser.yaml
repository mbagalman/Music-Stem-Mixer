# Debug preset with de-essing disabled and conservative processing.
sample_rate: 48000

stem_detection:
  vocals: [vox, vocal, lead, singer]
  drums: [drum, drums, kit, percussion]
  bass: [bass, sub]
  guitar: [gtr, guitar]
  keys: [keys, piano, synth, pad, rhodes, organ]

alignment:
  enabled: false
  threshold_dbfs: -45.0
  min_offset_ms: 25.0

chains:
  default:
    hpf_hz: 50.0
    stereo_width: 1.0
    compressor: {threshold_db: -20.0, ratio: 2.0, attack_ms: 15.0, release_ms: 120.0, makeup_db: 0.0}
    eq_peaks: []
    parallel_comp_blend: 0.0

  vocals:
    hpf_hz: 80.0
    stereo_width: 0.9
    deesser: {mode: off}
    compressor: {threshold_db: -18.0, ratio: 2.0, attack_ms: 12.0, release_ms: 100.0, makeup_db: 0.0}
    eq_peaks:
      - {freq: 320.0, q: 1.0, gain_db: -1.0}
    parallel_comp_blend: 0.0

  drums:
    hpf_hz: 30.0
    stereo_width: 1.0
    compressor: {threshold_db: -16.0, ratio: 2.5, attack_ms: 10.0, release_ms: 120.0, makeup_db: 0.0}
    eq_peaks: []
    parallel_comp_blend: 0.2

  bass:
    hpf_hz: 30.0
    stereo_width: 0.8
    compressor: {threshold_db: -18.0, ratio: 3.0, attack_ms: 25.0, release_ms: 150.0, makeup_db: 0.0}
    eq_peaks: []
    parallel_comp_blend: 0.0

  guitar:
    hpf_hz: 60.0
    stereo_width: 1.05
    compressor: {threshold_db: -20.0, ratio: 2.0, attack_ms: 15.0, release_ms: 120.0, makeup_db: 0.0}
    eq_peaks: []
    parallel_comp_blend: 0.0

  keys:
    hpf_hz: 50.0
    stereo_width: 1.0
    compressor: {threshold_db: -20.0, ratio: 2.0, attack_ms: 20.0, release_ms: 120.0, makeup_db: 0.0}
    eq_peaks: []
    parallel_comp_blend: 0.0

buses:
  default: {target_rms_dbfs: -22.0, gain_db: 0.0, pan: 0.0, stereo_width: 1.0}
  vocals: {target_rms_dbfs: -21.0, gain_db: 0.0, pan: 0.0, stereo_width: 0.95}
  drums: {target_rms_dbfs: -20.0, gain_db: 0.0, pan: 0.0, stereo_width: 1.0, mono_below_hz: 130.0}
  bass: {target_rms_dbfs: -22.0, gain_db: 0.0, pan: 0.0, stereo_width: 0.8, mono_below_hz: 170.0}
  guitar: {target_rms_dbfs: -22.0, gain_db: 0.0, pan: -0.1, stereo_width: 1.05}
  keys: {target_rms_dbfs: -22.0, gain_db: 0.0, pan: 0.1, stereo_width: 1.0}

sidechain:
  enabled: false
  trigger: drums
  targets: [bass]
  amount: 0.18
  attack_ms: 5.0
  release_ms: 120.0
  mode: low_band
  low_band_hz: 140.0

master:
  hpf_hz: 30.0
  high_shelf: {freq_hz: 12000.0, gain_db: 0.0}
  compressor: {threshold_db: -16.0, ratio: 1.3, attack_ms: 20.0, release_ms: 180.0, makeup_db: 0.0}
  limiter: {ceiling_dbfs: -1.5, release_ms: 150.0}
  target_lufs: -16.0
  reference_match: {tonal_balance_mode: off, amount: 0.0, max_tilt_db_per_octave: 2.5}
  multiband:
    enabled: false
    bands: [100, 500, 2000, 8000]
    ratios: [1.5, 1.8, 2.0, 1.5, 1.3]
    threshold_db: -20.0
    attack_ms: 10.0
    release_ms: 120.0
